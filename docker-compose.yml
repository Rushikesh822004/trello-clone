name: trello-clone

services:

  mongodb:
    image: mongo:8
    container_name: trello-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    restart: unless-stopped

  backend:
    build:
      context: ./backend

    container_name: trello-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - mongodb

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: trello-frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    stdin_open: true

    tty: true

    restart: unless-stopped

volumes:
  mongodb_data: